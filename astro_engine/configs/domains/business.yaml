# ═══════════════════════════════════════════════════════════════
# Business Domain Calibration Config (v1.0)
# ═══════════════════════════════════════════════════════════════
#
# Category: Domain-Specific (freely tunable per domain)
# Scope: Business domain ONLY — never affects trading, career, etc.
# Tuning authority: Business outcome feedback loop
#
# Change control:
#   - Can change freely without cross-domain approval
#   - Bump version on any parameter change
#   - Document rationale in commit message

version: "1.0.0"
domain: "business"
released: "2026-05-23"
description: "Business domain calibration — entrepreneurial growth, scaling, venture timing"

# ── Reference Weights (Lagna vs Moon) ─────────────────────────────────────────
# Business decisions benefit from balanced Lagna (action) + Moon (intuition)
reference_weights:
  business_launch: {lagna: 0.55, moon: 0.45}
  business_expansion: {lagna: 0.50, moon: 0.50}
  business_closure: {lagna: 0.60, moon: 0.40}
  business_partnership: {lagna: 0.45, moon: 0.55}
  profit_growth: {lagna: 0.50, moon: 0.50}
  speculative_business: {lagna: 0.40, moon: 0.60}
  funding: {lagna: 0.55, moon: 0.45}
  scaling: {lagna: 0.60, moon: 0.40}

# ── Risk Weights (Business-specific amplification) ────────────────────────────
# How much each factor amplifies operational risk in business context
risk_weights:
  node_crisis: 1.2
  sade_sati: 1.3
  chandrabala_8th: 1.5
  kala_sarpa: 1.1
  dainya: 1.3
  jupiter_saturn_conflict: 1.4
  dasha_sandhi: 1.2

# ── Risk Caps (Business context) ─────────────────────────────────────────────
# Beyond these points, additional factor pressure has diminishing marginal effect
risk_caps:
  saturn_pressure: 30
  node_crisis: 25
  sade_sati_peak: 35
  dainya_stress: 25
  dasha_sandhi: 20
  chandrabala_8th: 30

# ── Decision Thresholds (Business lifecycle) ──────────────────────────────────
# These are business-native — NOT the same as trading thresholds
decision:
  scale_aggressively:
    confidence_min: 75
    risk_max: 25
    description: "Conditions support bold expansion, new market entry, major launches"
  execute_growth:
    confidence_min: 60
    risk_max: 40
    description: "Normal growth operations, pursue calculated opportunities"
  cautious_growth:
    confidence_min: 45
    risk_max: 60
    description: "Continue but reduce new commitments, strengthen existing revenue"
  consolidate:
    confidence_min: 30
    risk_max: 80
    description: "Protect current position, reduce burn rate, defer expansion"
  protect:
    risk_min: 80
    confidence_max: 30
    description: "Halt all expansion, preserve capital, restructure if needed"

# ── Event Scoring Boosts (Business domain) ────────────────────────────────────
# Amplify/dampen event scores based on business relevance
event_scoring:
  business_event_boost: 1.20
  non_business_damp: 0.40
  mercury_karaka_bonus: 15
  jupiter_expansion_bonus: 12
  mars_execution_bonus: 8
  saturn_structure_bonus: 10

# ── Timing Windows (Business-specific) ────────────────────────────────────────
# Business has LONGER windows than trading (lifecycle vs daily)
timing:
  dasha_broad_window_default_days: 365
  transit_medium_window_default_days: 120
  fast_trigger_exact_window_default_days: 3
  confidence_decay_rate: 0.02  # per day beyond window

# ── Nakshatra Lists (Business-specific) ───────────────────────────────────────
# NOT the same as trading nakshatras — business has different sensitivities
favorable_nakshatras:
  - Pushya        # Nourishment, growth, prosperity
  - Rohini        # Material abundance, creative ventures
  - Anuradha      # Success through devotion, partnerships
  - Hasta         # Skill, craftsmanship, deal-making
  - Revati        # Journeys (market expansion), completion
  - Uttaraphalguni # Contracts, partnerships, prosperity

unfavorable_nakshatras:
  - Ashlesha      # Deception risk in business deals
  - Jyeshtha      # Competitive struggles, hidden enemies
  - Mula          # Destruction of existing structures
  - Bharani       # Extreme transformation, capital destruction

# ── Business Gate (analogous to trading_gate) ─────────────────────────────────
# Conditions that BLOCK major business decisions regardless of other signals
business_gate:
  hard_blocks:
    - chandrabala_8th         # Never sign deals on 8th from Moon
    - dasha_sandhi_active     # Never launch during dasha transition
    - mercury_combust         # Never negotiate when Mercury is combust
  soft_blocks:
    - moorthy_loha            # Reduce activity, don't block
    - sade_sati_peak          # Extra caution, not hard block
    - node_crisis_high        # Adapt, don't halt

# ── Confidence Formula (Business-specific) ────────────────────────────────────
confidence:
  base_multiplier: 55
  yoga_weight: 0.25
  yoga_cap: 12
  dasha_karaka_bonus: 15
  transit_double_transit_bonus: 20
  mercury_strong_bonus: 10
  jupiter_strong_bonus: 8
  partnership_venus_bonus: 6
  sandhi_multiplier: 0.65
  vimsopaka_weak_multiplier: 0.70

# ── Classical Pattern Modifiers ───────────────────────────────────────────────
# How natal promise patterns modify confidence when timing rules fire
archetype_modifiers:
  speculative_business_archetype: 1.15
  merchant_trader_archetype: 1.10
  partnership_wealth_archetype: 1.08
  viral_network_business_archetype: 1.12
  born_administrator_archetype: 1.10
  technology_engineering_archetype: 1.05
  family_business_archetype: 1.05
  litigation_partnership_archetype: 0.95  # Higher friction = slight confidence reduction
